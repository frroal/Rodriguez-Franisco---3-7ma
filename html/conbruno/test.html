<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cookie Clicker Avanzado</title>

<style>
body{
    font-family: Arial;
    background:#f5e6c8;
    text-align:center;
}

h1{
    margin-top:20px;
}

#cookie{
    font-size:120px;
    cursor:pointer;
    transition:0.1s;
}

#cookie:active{
    transform:scale(0.9);
}

.panel{
    margin-top:20px;
}

button{
    padding:10px;
    margin:5px;
    font-size:16px;
    cursor:pointer;
}

.store{
    margin-top:30px;
    background:white;
    padding:15px;
    border-radius:10px;
    display:inline-block;
}
</style>
</head>

<body>

<h1>🍪 Cookie Clicker</h1>

<h2>Cookies: <span id="cookies">0</span></h2>
<h3>Por segundo: <span id="cps">0</span></h3>

<div id="cookie">🍪</div>

<div class="store">
<h2>Tienda</h2>

<button onclick="buyCursor()">Auto Clicker (50)</button>
<span id="cursorCount">0</span>

<br>

<button onclick="buyFactory()">Fábrica (500)</button>
<span id="factoryCount">0</span>

</div>

<script>

let cookies = 0

let cursor = 0
let factory = 0

function update(){

document.getElementById("cookies").textContent = Math.floor(cookies)

let cps = cursor*1 + factory*10
document.getElementById("cps").textContent = cps

document.getElementById("cursorCount").textContent = cursor
document.getElementById("factoryCount").textContent = factory

save()

}

document.getElementById("cookie").onclick = function(){
cookies++
update()
}

function buyCursor(){

if(cookies >= 50){

cookies -= 50
cursor++
update()

}

}

function buyFactory(){

if(cookies >= 500){

cookies -= 500
factory++
update()

}

}

setInterval(function(){

cookies += cursor*10
cookies += factory*50

update()

},1000)

function save(){

localStorage.setItem("cookies",cookies)
localStorage.setItem("cursor",cursor)
localStorage.setItem("factory",factory)

}

function load(){

cookies = parseInt(localStorage.getItem("cookies")) || 0
cursor = parseInt(localStorage.getItem("cursor")) || 0
factory = parseInt(localStorage.getItem("factory")) || 0

}

load()
update()

</script>

</body>
</html>
